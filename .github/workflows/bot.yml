name: Bombardeo TikTok F4F

on:
  workflow_dispatch:
  # Se ejecuta automáticamente cada 6 horas
  schedule:
    - cron: '0 */6 * * *'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Crear archivo de cookies
        shell: bash
        run: |
          # Usamos un método blindado para que no se pierda ni un carácter
          cat << 'EOF' > cookies.json
          ${{ secrets.TIKTOK_COOKIES }}
          EOF
          
          # Verificación rápida (no muestra el contenido por seguridad, solo si existe)
          if [ -s cookies.json ]; then
            echo "✅ Archivo de cookies creado correctamente."
          else
            echo "❌ ERROR: El archivo de cookies está vacío. Revisa tus GitHub Secrets."
            exit 1
          fi

      - name: Ejecutar Bot
        run: xvfb-run python main.py
        env:
          # IMPORTANTE: Aquí le decimos al script que lea el ARCHIVO que acabamos de crear
          TIKTOK_COOKIES: cookies.json
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
