name: Bombardeo TikTok F4F
on:
  schedule:
    - cron: '0 */1 * * *' # Se ejecuta cada hora
  workflow_dispatch: # Botón manual

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar Herramientas Pro
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb
          
      - name: Instalar librerías y Navegador
        run: |
          python -m pip install --upgrade pip
          pip install tiktok-uploader gdown "moviepy<2.0.0" proglog playwright
          playwright install chromium --with-deps
          
      - name: 🚀 EJECUTAR BOT
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: xvfb-run python main.py
