name: Bombardeo TikTok F4F
on:
  schedule:
    # Se ejecuta cada hora para cubrir los 15-20 videos diarios
    - cron: '0 */1 * * *'
  workflow_dispatch: # Botón manual

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar FFmpeg y Navegador
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser
          
      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install tiktok-uploader gdown "moviepy<2.0.0" proglog
          
      - name: 🚀 EJECUTAR BOT
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python main.py
