name: Bombardeo TikTok F4F

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Crear archivo de cookies (MÉTODO SEGURO)
        shell: python
        env:
          # Pasamos el secreto como variable de entorno primero
          RAW_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          import os
          # Leemos la variable y la escribimos en un archivo real usando Python
          cookies = os.getenv('RAW_COOKIES')
          if cookies:
              with open('cookies.json', 'w') as f:
                  f.write(cookies)
              print("✅ Archivo cookies.json creado con éxito.")
          else:
              print("❌ ERROR: El secreto TIKTOK_COOKIES está vacío en GitHub Settings.")
              exit(1)

      - name: Ejecutar Bot
        run: xvfb-run python main.py
        env:
          # Le pasamos al script la RUTA del archivo que acabamos de crear
          TIKTOK_COOKIES: cookies.json
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
